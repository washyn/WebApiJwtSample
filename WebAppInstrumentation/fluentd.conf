<system>
  workers 2
</system>
<source>
  @type http
  port 8888
  bind 0.0.0.0
  add_http_headers false
</source>

<match **>
  @type copy

  <store>
    @type stdout
  </store>

  <store>
    @type file
    path C:/Users/Administrador/Downloads/fluentd_output/ak_app_
    append true
    
    <buffer time>
      @type file
      path C:/Users/Administrador/Downloads/fluentd_output/buffer

      timekey 1h
      timekey_wait 5m
      timekey_use_utc false

      flush_mode interval
      flush_interval 20s
    </buffer>

    <format>
      @type json
    </format>
  </store>

</match>