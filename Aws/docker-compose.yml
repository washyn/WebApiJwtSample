services:
  localstack:
    image: localstack/localstack:3.4
    container_name: delosi-localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - DEBUG=1
      - SERVICES=sqs,sns,dynamodb,events,lambda,iam,logs,s3
      - LOCALSTACK_AUTH_TOKEN=ls-HODI9586-gEfa-GUYU-gINo-7455hiGe01e0
      # - PERSISTENCE=1
      # - LAMBDA_EXECUTOR=docker
      # - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./localstack/init:/etc/localstack/init/ready.d"
    #   - "/var/run/docker.sock:/var/run/docker.sock"
    #   - "./docker/localstack-data:/var/lib/localstack"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 15



